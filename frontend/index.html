<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyek Saya</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            padding: 40px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
            font-size: 1.2em;
        }
        #api-data {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 5px;
            color: #495057;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Selamat Datang di Proyek Saya!</h1>
        <p>Halaman ini disajikan oleh FastAPI.</p>
        <div id="api-data">
            <p>Memuat data dari backend...</p>
        </div>
    </div>

    <script>
        // Fungsi untuk mengambil data dari API backend
        async function fetchDataFromAPI() {
            const dataContainer = document.getElementById('api-data');
            try {
                // Ganti URL jika backend Anda berjalan di tempat lain
                const response = await fetch('http://localhost:3000/api/data');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();

                // Menampilkan data yang diterima dari API
                dataContainer.innerHTML = `
                    <p><strong>Pesan dari Backend:</strong> ${data.message}</p>
                    <p><strong>Nama Proyek:</strong> ${data.project}</p>
                `;
            } catch (error) {
                // Menampilkan pesan error jika gagal mengambil data
                dataContainer.innerHTML = `<p style="color: red;">Gagal memuat data: ${error.message}</p>`;
                console.error('Error fetching data:', error);
            }
        }

        // Panggil fungsi saat halaman selesai dimuat
        document.addEventListener('DOMContentLoaded', fetchDataFromAPI);
    </script>

</body>
</html>
